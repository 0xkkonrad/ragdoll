<!DOCTYPE html>
<html>
    <head>
        <title>Peanut Ragdoll</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
        <style>
            html, body {
                margin: 0;
                padding: 0;
                height: 100%;
                background: #EFE4FF;
                font-family: system-ui, -apple-system, sans-serif;
                overflow: hidden;
            }
            canvas {
                display: block;
                width: 100vw;
                height: 100vh;
                cursor: grab;
            }
            canvas.dragging { cursor: grabbing; }
            #hud {
                position: fixed;
                bottom: 12px;
                left: 12px;
                color: #000;
                font-size: 12px;
                opacity: 0.6;
                pointer-events: none;
            }
            #debug-toggle {
                position: fixed;
                top: 12px;
                right: 12px;
                width: 28px;
                height: 28px;
                padding: 0;
                border: 1px solid rgba(0,0,0,0.15);
                border-radius: 6px;
                background: rgba(255,255,255,0.85);
                color: #000;
                font-size: 14px;
                line-height: 1;
                cursor: pointer;
                z-index: 10;
                opacity: 0.6;
            }
            #debug-toggle:hover { opacity: 1; }
            #tune.hidden { display: none; }
            #tune {
                position: fixed;
                top: 48px;
                right: 12px;
                background: rgba(255,255,255,0.85);
                border: 1px solid rgba(0,0,0,0.15);
                border-radius: 6px;
                padding: 8px 10px;
                font-size: 11px;
                color: #000;
                display: grid;
                grid-template-columns: max-content 120px 36px;
                gap: 4px 8px;
                align-items: center;
                user-select: none;
            }
            #tune h4 {
                margin: 0;
                grid-column: 1 / -1;
                font-size: 11px;
                font-weight: 600;
                letter-spacing: 0.05em;
                text-transform: uppercase;
                opacity: 0.6;
            }
            #tune label { white-space: nowrap; }
            #tune .val { font-variant-numeric: tabular-nums; opacity: 0.8; text-align: right; }
            #tune input[type="range"] { width: 100%; }
        </style>
    </head>
    <body>
        <canvas id="stage"></canvas>
        <div id="hud">drag the peanut · R to reset · ~ for debug</div>
        <button id="debug-toggle" title="Toggle debug panel (~)" aria-label="Toggle debug panel">⚙</button>
        <div id="tune" class="hidden">
            <h4>debug</h4>
            <label>ARM_L</label>
            <input type="range" data-key="ARM_L" min="0.2" max="2.0" step="0.01" value="0.705"/>
            <span class="val" data-val="ARM_L">0.71</span>
            <label>LEG_L</label>
            <input type="range" data-key="LEG_L" min="0.2" max="2.5" step="0.01" value="0.96"/>
            <span class="val" data-val="LEG_L">0.96</span>
            <label>SHOULDER_X</label>
            <input type="range" data-key="SHOULDER_X" min="0.0" max="0.6" step="0.01" value="0.18"/>
            <span class="val" data-val="SHOULDER_X">0.18</span>
            <label>HIP_X</label>
            <input type="range" data-key="HIP_X" min="0.1" max="0.5" step="0.01" value="0.3"/>
            <span class="val" data-val="HIP_X">0.30</span>
            <label>shoulder °</label>
            <input type="range" data-key="SHOULDER_DEG" min="0" max="180" step="1" value="90"/>
            <span class="val" data-val="SHOULDER_DEG">90</span>
            <label>hip °</label>
            <input type="range" data-key="HIP_DEG" min="0" max="180" step="1" value="60"/>
            <span class="val" data-val="HIP_DEG">60</span>
            <label>wrist °</label>
            <input type="range" data-key="WRIST_DEG" min="0" max="180" step="1" value="90"/>
            <span class="val" data-val="WRIST_DEG">90</span>
            <label>ankle °</label>
            <input type="range" data-key="ANKLE_DEG" min="0" max="180" step="1" value="30"/>
            <span class="val" data-val="ANKLE_DEG">30</span>
            <label>hand °</label>
            <input type="range" data-key="HAND_DEG" min="-180" max="180" step="1" value="20"/>
            <span class="val" data-val="HAND_DEG">20</span>
            <label>hand flipX</label>
            <input type="checkbox" data-key="HAND_FLIPX"/>
            <span class="val" data-val="HAND_FLIPX">off</span>
            <label>hand flipY</label>
            <input type="checkbox" data-key="HAND_FLIPY"/>
            <span class="val" data-val="HAND_FLIPY">off</span>
            <label>sleepy</label>
            <input type="checkbox" data-key="SLEEPY" checked/>
            <span class="val" data-val="SLEEPY">on</span>
            <label>wireframes</label>
            <input type="checkbox" data-key="WIREFRAMES"/>
            <span class="val" data-val="WIREFRAMES">off</span>
        </div>
        <script>
            // Wire sliders → window.__ragdoll.setTune(...). Rebuilds the world.
            // Uses 'change' (commit on release) to avoid spamming buildWorld() while dragging.
            (function () {
                function init() {
                    if (!window.__ragdoll) return setTimeout(init, 50)
                    // Reflect actual runtime values in case defaults differ from the HTML.
                    const t = window.__ragdoll.tune
                    for (const el of document.querySelectorAll('#tune input[type=range]')) {
                        const k = el.dataset.key
                        if (k in t) {
                            el.value = t[k]
                            document.querySelector(`#tune [data-val="${k}"]`).textContent =
                                Number.isInteger(t[k]) ? t[k] : (+t[k]).toFixed(2)
                        }
                        el.addEventListener('input', () => {
                            document.querySelector(`#tune [data-val="${k}"]`).textContent =
                                el.step.includes('.') ? (+el.value).toFixed(2) : el.value
                        })
                        el.addEventListener('change', () => {
                            window.__ragdoll.setTune({ [k]: +el.value })
                        })
                    }
                    for (const el of document.querySelectorAll('#tune input[type=checkbox]')) {
                        const k = el.dataset.key
                        if (k in t) {
                            el.checked = !!t[k]
                            document.querySelector(`#tune [data-val="${k}"]`).textContent = t[k] ? 'on' : 'off'
                        }
                        el.addEventListener('change', () => {
                            document.querySelector(`#tune [data-val="${k}"]`).textContent = el.checked ? 'on' : 'off'
                            window.__ragdoll.setTune({ [k]: el.checked })
                        })
                    }
                }
                init()
            })()

            // Show/hide the debug panel via the corner button or `~`.
            (function () {
                const panel = document.getElementById('tune')
                const btn = document.getElementById('debug-toggle')
                function toggle() { panel.classList.toggle('hidden') }
                btn.addEventListener('click', toggle)
                window.addEventListener('keydown', (e) => {
                    if (e.target.tagName === 'INPUT') return
                    if (e.key === '`' || e.key === '~') { toggle(); e.preventDefault() }
                })
            })()
        </script>
        <pre id="err" style="position:fixed;top:8px;left:8px;color:#900;background:#fff;padding:8px;font:12px/1.4 ui-monospace,Menlo,monospace;max-width:90vw;white-space:pre-wrap;display:none;border:1px solid #900;"></pre>
        <script>
            (function () {
                const errBox = document.getElementById('err');
                function show(msg) {
                    errBox.style.display = 'block';
                    errBox.textContent = (errBox.textContent + '\n' + msg).trim();
                }
                window.addEventListener('error', e => show('ERROR: ' + (e.error?.stack || e.message)));
                window.addEventListener('unhandledrejection', e => show('UNHANDLED: ' + (e.reason?.stack || e.reason)));
            })();
        </script>
        <script type="module" src="/src/main.js"></script>
    </body>
</html>
